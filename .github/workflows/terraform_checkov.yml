name: Terraform Security Scan (Checkov Hybrid)

on:
  pull_request:
    branches:
      - automation

jobs:
  checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      # 1️⃣ Soft governance - report everything but DO NOT fail
      - name: Checkov Soft Governance
        run: |
          checkov -d Projects --soft-fail

      # 2️⃣ Enforce public bucket policy (GCP + AWS)
      - name: Enforce Public Access Prevention on Buckets
        run: |
          checkov -d Projects -c CKV_GCP_114,CKV2_AWS_6