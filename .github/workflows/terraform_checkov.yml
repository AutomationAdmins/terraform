name: Terraform Security Scan # Checkov

on:
  pull_request:
    branches: [automation]

jobs:
  checkov:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Projects

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov (Soft Mode)
        run: |
          checkov -d . --config-file .checkov.yml --soft-fail

      - name: Run Checkov (Enforce Critical)
        run: |
          checkov -d . \
            --config-file .checkov.yml \
            --hard-fail-on CKV_GCP_1,CKV_GCP_2