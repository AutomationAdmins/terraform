name: Terraform Apply (AWS)

on:
  push:
    branches:
      - automation
    paths:
      - 'Projects-AWS/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    defaults:
      run:
        working-directory: Projects-AWS

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Notify requestor - Bucket Created
        if: success()
        env:
          GH_TOKEN: ${{ secrets.INFRA_BOT_PAT }}
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ISSUE_NUM=$(echo "$COMMIT_MSG" | grep -oP '\[Issue #\K[0-9]+' || true)
          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --body "Buckets created"
            gh issue comment "$ISSUE_NUM" \
              --body "Your bucket has been successfully provisioned! Terraform apply completed in run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            gh issue close "$ISSUE_NUM" --reason completed
          fi
