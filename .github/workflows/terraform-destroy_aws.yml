name: Terraform Destroy (AWS)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
      resource_type:
        description: "Resource type (e.g. aws_s3_bucket)"
        required: true
        type: choice
        options:
          - aws_s3_bucket
          - aws_s3_bucket_public_access_block
      resource_name:
        description: "Resource name in Terraform (e.g. my_dev_bucket_1)"
        required: true

jobs:
  destroy:
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        working-directory: Projects-AWS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: automation

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Destroy Target
        run: |
          RESOURCE="${{ github.event.inputs.resource_type }}.${{ github.event.inputs.resource_name }}"
          echo "Destroying: $RESOURCE"
          terraform destroy -target="$RESOURCE" -auto-approve

      - name: Remove resource from code
        working-directory: .
        run: |
          RESOURCE_TYPE="${{ github.event.inputs.resource_type }}"
          RESOURCE_NAME="${{ github.event.inputs.resource_name }}"

          echo "Removing $RESOURCE_TYPE.$RESOURCE_NAME from Terraform files..."

          python3 << 'SCRIPT'
          import re, glob, os

          resource_type = "${{ github.event.inputs.resource_type }}"
          resource_name = "${{ github.event.inputs.resource_name }}"

          for tf_file in glob.glob("Projects-AWS/**/*.tf", recursive=True):
              with open(tf_file, "r") as f:
                  content = f.read()

              pattern = rf'resource\s+"{re.escape(resource_type)}"\s+"{re.escape(resource_name)}"\s*\{{[^{{}}]*(?:\{{[^{{}}]*\}}[^{{}}]*)*\}}\s*'
              new_content = re.sub(pattern, '', content)

              if new_content != content:
                  new_content = re.sub(r'\n{3,}', '\n\n', new_content).strip() + '\n'
                  with open(tf_file, "w") as f:
                      f.write(new_content)
                  print(f"Cleaned: {tf_file}")

          SCRIPT

      - name: Commit and push cleanup
        working-directory: .
        run: |
          git config --global user.name "infra-destroy-bot"
          git config --global user.email "infra-bot@users.noreply.github.com"

          git add Projects-AWS/
          if git diff --cached --quiet; then
            echo "No code changes to commit"
          else
            git commit -m "Cleanup: removed ${{ github.event.inputs.resource_type }}.${{ github.event.inputs.resource_name }} after destroy"
            git push origin automation
          fi
