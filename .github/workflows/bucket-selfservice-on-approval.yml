name: Bucket Self Service Bot - On Approval

on:
  issues:
    types: [labeled]

jobs:
  bucket:
    if: github.event.label.name == 'approved-by-admin'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: automation
      - name: Extract issue form values
        id: vars
        shell: bash
        run: |
          BODY="$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )"
          echo "===== ISSUE BODY ====="
          echo "$BODY"
          echo "======================"
          bucket_name=$(echo "$BODY" | awk '/^### Bucket Name/ {found=1; next} found && NF {print; exit}')
          region=$(echo "$BODY" | awk '/^### Region/ {found=1; next} found && NF {print; exit}')
          environment=$(echo "$BODY" | awk '/^### Environment/ {found=1; next} found && NF {print; exit}')
          public_access=$(echo "$BODY" | awk '/^### Public Access/ {found=1; next} found && NF {print; exit}')
          cloud_provider=$(echo "$BODY" | awk '/^### Cloud Provider/ {found=1; next} found && NF {print; exit}')
          echo "bucket_name=$bucket_name" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "public_access=$public_access" >> "$GITHUB_OUTPUT"
          echo "cloud_provider=$cloud_provider" >> "$GITHUB_OUTPUT"
      - name: Print issue outputs
        run: |
          echo "cloud_provider='${{ steps.vars.outputs.cloud_provider }}'"
          echo "bucket_name='${{ steps.vars.outputs.bucket_name }}'"
          echo "region='${{ steps.vars.outputs.region }}'"
          echo "environment='${{ steps.vars.outputs.environment }}'"
          echo "public_access='${{ steps.vars.outputs.public_access }}'"
      - name: Generate Terraform File
        run: |
          BUCKET="${{ steps.vars.outputs.bucket_name }}"
          REGION="${{ steps.vars.outputs.region }}"
          ENV="${{ steps.vars.outputs.environment }}"
          PROVIDER="${{ steps.vars.outputs.cloud_provider }}"
          SAFE_NAME=$(echo "$BUCKET" | tr '-' '_')

          if [ "$PROVIDER" = "AWS" ]; then
            cat <<EOF >> Projects-AWS/s3.tf

          resource "aws_s3_bucket" "${SAFE_NAME}" {
            bucket = "${BUCKET}"

            tags = {
              Environment = "${ENV}"
              Owner       = "selfservice"
            }
          }

          resource "aws_s3_bucket_public_access_block" "${SAFE_NAME}_public_access" {
            bucket = aws_s3_bucket.${SAFE_NAME}.id

            block_public_acls       = true
            block_public_policy     = true
            ignore_public_acls      = true
            restrict_public_buckets = true
          }
          EOF
          else
            cat <<EOF >> Projects/gcs.tf

          resource "google_storage_bucket" "${SAFE_NAME}" {
            name     = "${BUCKET}"
            location = "${REGION}"

            uniform_bucket_level_access = true
            public_access_prevention    = "enforced"

            labels = {
              env   = "${ENV}"
              owner = "selfservice"
            }
          }
          EOF
          fi

      - name: Format Terraform
        uses: hashicorp/setup-terraform@v2

      - run: terraform fmt Projects/
      - run: terraform fmt Projects-AWS/
      - name: Debug Token
        run: |
          if [ -z "${{ secrets.INFRA_BOT_PAT }}" ]; then
            echo "PAT is empty"
            exit 1
          else
            echo "PAT exists"
          fi
      - name: Debug GH auth
        env:
          GH_TOKEN: ${{ secrets.INFRA_BOT_PAT }}
        run: |
          gh auth status || true
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.INFRA_BOT_PAT }}
        run: |
          BRANCH_NAME="bucket-${{ steps.vars.outputs.bucket_name }}-${{ github.run_id }}"

          git config --global user.name "infra-selfservice-bot"
          git config --global user.email "infra-bot@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          echo "${{ github.event.issue.number }}" > .issue_number
          git add .issue_number Projects/ Projects-AWS/
          git commit -m "Auto: ${{ steps.vars.outputs.cloud_provider }} bucket ${{ steps.vars.outputs.bucket_name }}-${{ github.run_id }} [Issue #${{ github.event.issue.number }}]"
          git push origin "$BRANCH_NAME"


          gh pr create \
            --base automation \
            --head "$BRANCH_NAME" \
            --title "Self-service ${{ steps.vars.outputs.cloud_provider }} bucket: ${{ steps.vars.outputs.bucket_name }}-${{ github.run_id }}" \
            --body "Provider: ${{ steps.vars.outputs.cloud_provider }} | Bucket: ${{ steps.vars.outputs.bucket_name }} | Region: ${{ steps.vars.outputs.region }} | Env: ${{ steps.vars.outputs.environment }} | [Issue #${{ github.event.issue.number }}]"

          gh pr edit "$BRANCH_NAME" --add-label "ready-for-plan"

      - name: Notify requestor - In Progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Your request is being processed. A PR has been created for your **${{ steps.vars.outputs.cloud_provider }}** bucket **${{ steps.vars.outputs.bucket_name }}**. Your bucket will be provisioned once the PR is reviewed and merged."
