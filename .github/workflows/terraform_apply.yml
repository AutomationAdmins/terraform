name: Terraform apply

# Trigger pipeline on push to main branch or manual run
on:
  workflow_dispatch: # Manual trigger

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: Projects

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Convert plan to JSON
        run: terraform show -json tfplan > tfplan.json
     
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Upload Terraform Artifacts to GCS
        run: |
          RUN_ID=${{ github.run_id }}
          gsutil cp tfplan gs://${{ secrets.TF_ARTIFACT_BUCKET }}/plans/$RUN_ID/
          gsutil cp tfplan.json gs://${{ secrets.TF_ARTIFACT_BUCKET }}/plans/$RUN_ID/