name: Terraform Apply (GCP)

# Trigger pipeline on push to main branch or manual run
on:
  push:
    branches:
      - automation
    paths:
      - 'Projects/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    defaults:
      run:
        working-directory: Projects

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Convert plan to JSON
        run: terraform show -json tfplan > tfplan.json
     
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Upload Terraform Artifacts to GCS
        run: |
          RUN_ID=${{ github.run_id }}
          gsutil cp tfplan gs://${{ secrets.TF_ARTIFACT_BUCKET }}/plans/$RUN_ID/
          gsutil cp tfplan.json gs://${{ secrets.TF_ARTIFACT_BUCKET }}/plans/$RUN_ID/

      - name: Notify requestor - Bucket Created
        if: success()
        env:
          GH_TOKEN: ${{ secrets.INFRA_BOT_PAT }}
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ISSUE_NUM=$(echo "$COMMIT_MSG" | grep -oP '\[Issue #\K[0-9]+' || true)
          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --body "Buckets created"
            gh issue comment "$ISSUE_NUM" \
              --body "Your bucket has been successfully provisioned! Terraform apply completed in run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            gh issue close "$ISSUE_NUM" --reason completed
          fi