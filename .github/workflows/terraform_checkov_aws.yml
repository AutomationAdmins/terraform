name: Terraform Security Scan - AWS (Checkov)

on:
  pull_request:
    branches:
      - automation
    paths:
      - 'Projects-AWS/**'

jobs:
  checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Checkov Soft Governance (AWS)
        run: |
          checkov -d Projects-AWS --soft-fail

      - name: Enforce Public Access Prevention on AWS Buckets
        run: |
          checkov -d Projects-AWS -c CKV2_AWS_6
