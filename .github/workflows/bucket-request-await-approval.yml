name: Bucket Request Awaiting Approval

on:
  issues:
    types: [opened]

jobs:
  wait-for-approval:
    if: contains(github.event.issue.labels.*.name, 'infra-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Comment awaiting approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Thank you for using CloudGate Self service portal. Admin will review the request and approve it shortly."
