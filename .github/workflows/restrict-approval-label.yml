name: Restrict Approval Label

on:
  issues:
    types: [labeled]

jobs:
  restrict-label:
    if: github.event.label.name == 'approved-by-admin'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check if user is admin
        id: check_admin
        uses: actions/github-script@v7
        with:
          script: |
            const adminTeam = 'admins'; // Change to your team name
            const org = context.repo.owner;
            const username = context.payload.sender.login;
            try {
              const { data: members } = await github.rest.teams.listMembersInOrg({
                org,
                team_slug: adminTeam,
              });
              const isAdmin = members.some(member => member.login === username);
              core.setOutput('is_admin', isAdmin);
            } catch (e) {
              core.setOutput('is_admin', false);
            }
      - name: Remove label and comment if not admin
        if: steps.check_admin.outputs.is_admin != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --remove-label "approved-by-admin"
          gh issue comment ${{ github.event.issue.number }} --body "Only admins can approve requests by adding the 'approved-by-admin' label."
