# .github/workflows/pr-check.yml
name: Terraform PR Check

on:
  pull_request:
    branches: [automation]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate