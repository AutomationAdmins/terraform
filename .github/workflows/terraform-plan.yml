name: Terraform Plan #(Label Triggered)

on:
  pull_request:
    branches: [automation]
    types: [labeled]

jobs:
  plan:
    if: github.event.label.name == 'ready-for-plan'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    defaults:
      run:
        working-directory: Projects

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Convert plan to JSON
        run: terraform show -json tfplan > tfplan.json
      - name: Infracost Breakdown
        working-directory: Projects
        run: |
          infracost breakdown --path infracost.json --format json --out-file infracost.json

      - name: Infracost Comment
        uses: infracost/actions/comment@v1.1.2
        with:
          path: Projects/infracost.json
          behavior: update

      - name: Terraform Plan Summary
        run: |
          echo "## Terraform Plan Summary" > summary.md
          terraform show -no-color tfplan >> summary.md

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('Projects/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary.substring(0, 65000)
            });