name: Bucket Self Service Bot

on:
  issues:
    types: [opened]

jobs:
  bucket:
    if: contains(github.event.issue.labels.*.name, 'infra-request')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: automation   # base branch

      - name: Extract issue form values
        id: vars
        shell: bash
        run: |
          BODY="$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )"

          echo "===== ISSUE BODY ====="
          echo "$BODY"
          echo "======================"

          bucket_name=$(echo "$BODY" | awk '
            /^### Bucket Name/ {found=1; next}
            found && NF {print; exit}
          ')

          region=$(echo "$BODY" | awk '
            /^### Region/ {found=1; next}
            found && NF {print; exit}
          ')

          environment=$(echo "$BODY" | awk '
            /^### Environment/ {found=1; next}
            found && NF {print; exit}
          ')

          public_access=$(echo "$BODY" | awk '
            /^### Public Access/ {found=1; next}
            found && NF {print; exit}
          ')

          echo "bucket_name=$bucket_name" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "public_access=$public_access" >> "$GITHUB_OUTPUT"

      - name: Print issue outputs
        run: |
          echo "bucket_name='${{ steps.vars.outputs.bucket_name }}'"
          echo "region='${{ steps.vars.outputs.region }}'"
          echo "environment='${{ steps.vars.outputs.environment }}'"
          echo "public_access='${{ steps.vars.outputs.public_access }}'"


      - name: Generate Terraform File
        run: |
          BUCKET="${{ steps.vars.outputs.bucket_name }}"
          REGION="${{ steps.vars.outputs.region }}"
          ENV="${{ steps.vars.outputs.environment }}"

          mkdir -p Projects/buckets
          cat <<EOF > Projects/buckets/buckets.tf
          resource "google_storage_bucket" "${{ steps.vars.outputs.bucket_name }}" {
            name     = "${{ steps.vars.outputs.bucket_name }}"
            location = "${{ steps.vars.outputs.region }}"

            uniform_bucket_level_access = true
            public_access_prevention    = "enforced"

            labels = {
              env   = "${{ steps.vars.outputs.environment }}"
              owner = "selfservice"
            }
          }
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: automation
          branch: bucket-${{ steps.vars.outputs.bucket_name }}
          commit-message: "Auto: bucket ${{ steps.vars.outputs.bucket_name }}"
          title: "Self-service bucket: ${{ steps.vars.outputs.bucket_name }}"
          body: |
            ## GCS Bucket Request

            **Bucket:** `${{ steps.vars.outputs.bucket_name }}`
            **Region:** `${{ steps.vars.outputs.region }}`
            **Environment:** `${{ steps.vars.outputs.environment }}`

            Requested via self-service issue.
          labels: ready-for-plan