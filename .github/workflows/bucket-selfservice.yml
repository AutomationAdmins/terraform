name: Bucket Self Service Bot

on:
  issues:
    types: [opened]

jobs:
  bucket:
    if: contains(github.event.issue.labels.*.name, 'infra-request')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: automation   # base branch

      - name: Parse Issue
        id: issue
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/request-bucket.yml

      - name: Debug issue outputs
        run: |
          echo "bucket_name='${{ steps.issue.outputs.bucket_name }}'"
          echo "region='${{ steps.issue.outputs.region }}'"
          echo "environment='${{ steps.issue.outputs.environment }}'"
          echo "public_access='${{ steps.issue.outputs.public_access }}'"


      - name: Generate Terraform File
        run: |
          BUCKET="${{ steps.issue.outputs.bucket_name }}"
          REGION="${{ steps.issue.outputs.region }}"
          ENV="${{ steps.issue.outputs.environment }}"

          mkdir -p Projects/buckets
          cat <<EOF > Projects/buckets/buckets.tf
          resource "google_storage_bucket" "${{ steps.issue.outputs.bucket_name }}" {
            name     = "${{ steps.issue.outputs.bucket_name }}"
            location = "${{ steps.issue.outputs.region }}"

            uniform_bucket_level_access = true
            public_access_prevention    = "enforced"

            labels = {
              env   = "${{ steps.issue.outputs.environment }}"
              owner = "selfservice"
            }
          }
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: automation
          branch: bucket-${{ steps.issue.outputs.bucket_name }}
          commit-message: "Auto: bucket ${{ steps.issue.outputs.bucket_name }}"
          title: "Self-service bucket: ${{ steps.issue.outputs.bucket_name }}"
          body: |
            Bucket requested via self-service issue.
          labels: ready-for-plan