name: Terraform GCP

# Manual trigger only
on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # 1️⃣ Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Verify GCP secret exists
      - name: Verify GCP_SA_KEY secret
        run: |
          if [ -z "${GCP_SA_KEY}" ]; then
            echo "ERROR: GCP_SA_KEY secret not found"
            exit 1
          else
            echo "GCP_SA_KEY secret is present ✅"
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      # 3️⃣ Authenticate to GCP using Service Account JSON
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 4️⃣ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 5️⃣ Terraform Init (connects to backend)
      - name: Terraform Init
        working-directory: terraform/terraform
        run: terraform init

      # 6️⃣ Terraform Plan (safe preview)
      - name: Terraform Plan
        run: terraform plan

      # 7️⃣ Terraform Apply (creates infra) - COMMENTED FOR SAFETY
      #- name: Terraform Apply
      #  run: terraform apply -auto-approve
