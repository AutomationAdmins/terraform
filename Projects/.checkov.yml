# Checkov global configuration file
# This is used to skip checks during PoC phase
# Tighten these later for production enforcement

skip_checks:
  - CKV_GCP_2   # Public IP
  - CKV_GCP_9   # OS Login
  - CKV_GCP_29  # Disk encryption
  - CKV_GCP_62  # CMEK for storage
  - CKV_GCP_41  # MFA for IAM
  - CKV_GCP_39  # VPC Flow Logs
  - CKV_GCP_38  # Private Google Access
  - CKV_GCP_45  # Secure Boot
  - CKV_GCP_46  # Shielded VM
  - CKV_GCP_47  # OS Login with 2FA

output: cli
soft_fail: true
framework:
  - terraform
directory:
  - Projects
